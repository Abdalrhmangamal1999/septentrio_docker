
#28784 is the default TCP command port.
device: tcp://${RECEIVER_IP}:28784

serial:
  baudrate: 921600
  hw_flow_control: "off"

# Let the driver configure the receiver from this file.
configure_rx: true

login:
  user: "wakeb"
  password: "wakeb"

# --- Receiver type ----------------------------------------------------------
receiver_type: ins          # AntaRx-Si3 is an INS receiver
multi_antenna: true         # dual-antenna heading

use_ros_axis_orientation: true   # ENU / front-left-up (ROS REP-103)

# --- Frames -----------------------------------------------------------------
frame_id: gnss
imu_frame_id: imu
poi_frame_id: base_link
aux1_frame_id: aux1
vehicle_frame_id: base_link
get_spatial_config_from_tf: false

datum: Default
lock_utm_zone: true
leap_seconds: 18

# --- Rates ------------------------------------------------------------------

polling_period:
  pvt: 100
  rest: 100

use_gnss_time: false
latency_compensation: true

# --- RTK corrections (KSA-CORS / GEOSA NTRIP) -------------------------------
rtk_settings:
  ntrip_1:
    id: "NTR1"
    caster: "ntrip.example.gov.sa"  
    caster_port: 2101
    username: "USER"                
    password: "PASS"                
    mountpoint: "MOUNT"             
    version: "v2"
    tls: false
    rtk_standard: "RTCMv3"
    send_gga: "auto"
    keep_open: true

# --- INS spatial config -----------------------------------------------------
ins_spatial_config:
  imu_orientation:
    thetChanged file_name:= → path_to_config:=/tmp/cfg/rover.yamla_x: 0.0
    theta_y: 0.0
    theta_z: 0.0
  ant_lever_arm:        # IMU -> main GNSS antenna
    x: 0.0
    y: 0.0
    z: 0.0
  poi_lever_arm:        # IMU -> point of interest (base_link)
    delta_x: 0.0
    delta_y: 0.0
    delta_z: 0.0

ins_initial_heading: auto
ins_use_poi: true
ins_std_dev_mask:
  att_std_dev: 5.0
  pos_std_dev: 10.0

# --- What to publish --------------------------------------------------------
publish:
  auto_publish: false
  publish_only_valid: false
  navsatfix: true        # sensor_msgs/NavSatFix  -> navsat_transform_node
  gpsfix: true           # gps_msgs/GPSFix (detailed; carries heading in 'dip')
  imu: true              # sensor_msgs/Imu        -> ekf
  localization: true     # nav_msgs/Odometry (UTM)-> ekf
  tf: false
  #  SBF blocks 
  pvtgeodetic: true
  poscovgeodetic: true
  insnavgeod: true
  atteuler: true
  attcoveuler: true
  aimplusstatus: true
  diagnostics: true

activate_debug_log: false